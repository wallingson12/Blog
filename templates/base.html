<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Link Inicio -->
            <a class="navbar-brand" href="{{ url_for('index') }}">Inicio</a>

            <!-- Links centralizados -->
            <div class="navbar-nav ms-auto me-auto">  <!-- Espaços à esquerda e à direita para centralizar -->
                {% if current_user.is_authenticated %}
                    <a class="nav-link" href="{{ url_for('new_post') }}">Novo Post</a>
                    <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                    <a class="nav-link" href="{{ url_for('sobre') }}">Sobre</a>
                {% else %}
                    <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                    <a class="nav-link" href="{{ url_for('register') }}">Registrar</a>
                    <a class="nav-link" href="{{ url_for('sobre') }}">Sobre</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Conteúdo -->
    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <!-- Bloco de conteúdo específico para cada página -->
        {% block content %}{% endblock %}
    </div>

    <!-- Scripts do Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
